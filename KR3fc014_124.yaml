body:
  text: 又置第四等四十八戶二因得九十六又置第三等三十一戶四因得一百二十四又置第二等二十五戶八因得二百又置第一等一十六戶加六得二百五十六併五位數得七百三十八為法以法除官配銀得一兩五錢即是第五等一戶所出二因是第四等一戶所出又二因是第三等一戶所出又二因是第二等一戶所出又二因是第一等一戶所出卻以第一等一十六戶乘第一等戶所出得第一等戶總數餘仿此今有官配絹一百一十九匹一丈二寸四分令五等人戶從上作四六出之第一等二十五戶第二等三十戶第三等四十八戶第四等五十戶第五等六十五戶問每戶及逐等各該絹幾何答曰第一等每户一匹二丈即六丈該三十七匹二丈
