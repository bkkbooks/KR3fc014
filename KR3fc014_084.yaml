body:
  text: 四五六七八九居首非一也乃或折或倍必求一數居首而以定身除算之伹母法折倍則子數亦須折倍下算繁復下若歸除捷徑不必學也然求一卻能兼九歸定身除歸除三法亦不可不知耳先以二百四十斤折半得一百二十斤為法置鈔四百五十八兩六錢七分亦折半得二百二十九兩三錢三分五釐却以一百二十定身除之布算之方已具定身除乃更不重述今有脂麻二十三石四斗五升七合四勺糶銀三十八兩問兩該麻幾何答曰六斗一升七合三勺法曰置麻折半得一十一石七斗二升八合七勺別以銀折半得一十九兩為法定身除之今有鈔二十六兩三錢五分六釐五毫買絲四十五兩問每兩幾何
