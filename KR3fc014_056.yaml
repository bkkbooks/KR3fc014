body:
  text: 六歸六人分之每人該四十四兩二錢二分二分逢六進一十盡三錢逢六進一十起了六數而進一十於上位尚餘一六一下加四不動本身只於下位加四五兩逢六進一十起了六數而進一十於上位尚餘一六一下加四不動本身只於上位加四六十逢六進一十起了六數而進一十於上位尚餘二六二三十二變二作三更於下位加二二百六二三十二變二作三更於下位加二七歸七人分之每人該三十七兩九錢二釐八毫五絲七忽二分七二下加六只於下位加六七六八十四三位七四五十五四位
