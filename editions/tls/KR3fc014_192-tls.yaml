body:
  text: 二尺八寸得今該築高數今有方臺一所上方八尺下方二丈高一丈八尺今欲接築成方錐問接高幾何答曰接高一丈二尺法曰置高一丈八尺以上方八尺乘之得一十四丈四尺別置下方二丈於內減上方八尺餘一丈二尺爲法以法除一十四丈四尺得接高數今有方錐一所下方二丈四尺高三丈二尺欲於上方六尺截成方臺問截高幾何答曰截高八尺法曰置高三丈二尺以上方六尺乘之得一十九丈二尺以下方二丈四尺除之得截高數今有築堰上廣一丈四尺下廣二丈二尺高三丈六尺長二千五百二十尺每人一日自穿運築常積六十四尺問用人幾何答曰用二萬五千五百一十五人
