body:
  text: 九章名數按魏劉徽曰九章算經乃漢張蒼等刪補周公之遺書也後周甄鸞作草唐李淳風重註揚輝以爲黃帝之書蓋未之考爾一曰方田量田地之法二曰粟布粟者米也布者錢也蓋以錢糴米多寡之數三曰衷分衷等也貴賤之等不同廪祿之數亦異也四曰少廣截縱之多益廣之少也五曰商功修築隄牆開溝渠之法也六曰均輸均平也輸送也以均遠近輸送之勞費也七曰盈朒假設有餘不足之法以求隱互難見之數八曰方程程者禾數也方者所致行列方正也數之雜糅難算者立行列以求之九曰勾股量山量水以土圭測日影之類小大名數小數始於一一爲十分分爲十釐釐爲十毫毫爲十絲絲爲十忽忽爲十微微爲十纖纖爲十沙按俗本纖下復有塵埃渺漠糢湖逡巡須叟瞬息彈指刹那六德虛空清淨等名皆無用大數始於一十一爲十十十爲百
