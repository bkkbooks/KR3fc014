body:
  text: 二百二九一十八變二百作一十更於下位下八今有鈔四十五兩五錢買物假令每鈔一兩買物二斤問該物幾何二因答曰九十一斤三因每兩三斤該一百三十六斤半四因每兩四斤該一百八十二斤五因每兩五斤該二百二十七斤半六因每兩六斤該二百七十三斤七因每兩七斤該三百一十八斤半八因每兩八斤該三百六十四斤九因每兩九斤該四百九斤半法曰置都鈔數以每兩價因之布算同前更不重述加法一十一百一千一滿之類但首位一者用此法先從末位小數算起用定身除還元加法仍從下位先如因位數或多焉十居本位零居次一外添餘法更玄今有物二百六十八斤賣之
