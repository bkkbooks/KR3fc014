body:
  text: 異乘同除異乘同除法何如物賣錢來作例兒先下元錢乘只物卻將元物法除之將錢買物互乘取百里千斤以類推算者留心能善用一絲一忽不差池元有米五石八斗四升糶銀四兩三錢八分今只有米一石七斗二升問該銀幾何答曰一兩二錢九分法曰置銀數以只有米一石七斗二升乘之得七十五兩三錢三分六釐卻以元米五石八斗四升為法歸除之元有銀一兩二錢九分糴米一石七斗二升今只有銀四兩三錢八分問糴米幾何答曰五石八斗四升法曰置米數以只有銀四兩三錢八分乘之得七十五石三斗三升六合卻以元銀一兩二錢九分為法定身除之
