body:
  text: 合還長幾何答曰六十八尺二寸五分法曰置一端五十二尺作五百二十寸以闊二尺一寸乘之得一九二卻以常布闊一尺六寸為法定身除之斤稱銖求斤兩要相登二四明為一兩稱三八四除斤便是兩斤求此則相乘斤如求兩身加六減六留身兩見斤斤兩較時無別訣法中惟以五除增截兩為斤分數法一退六二五二一二五三一八七五四二五五三一二五六三七五七四三七五八五九五六二五十二五十一六八七五十二七五十三八一二五十四八七五
