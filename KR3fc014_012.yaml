body:
  text: 兩見斤減六斤求兩加六斤見稱減五稱求斤加五田畝丈量之法起於忽忽者長六寸闊一寸之地也十忽為絲十絲為毫十毫為釐十釐為分十分為寸又六十萬寸為一畝積二百四十步闊一步也又自方一步一面長五尺闊五尺計積二千五百寸二百四十步計六十萬寸也口授一數始於一窮於九至十則又為一十矣一乘法或單位或就身加或留頭乘三者皆乘也隨位數異其名耳布算皆從下起亦有從上起者乃開方之法用之亦可大場中卻能誤人故止依法用自下而上一乘從下乘上除從上除下一言十挨身言零隔位謂如喝五五二十五則二十挨身五為隔位蓋隔一位下也喝一
