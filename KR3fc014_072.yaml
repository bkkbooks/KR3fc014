body:
  text: 今有絲一百二十六兩五錢賣鈔六十八兩九錢四分二釐五毫問每兩幾何除三位答曰五錢四分五釐法曰置鈔數以絲數一二六五定身除之布算同前今有金戶一百零五名共辦金八十九兩二錢五分問每戶該金幾何隔位除答曰八錢五分法曰置共辦金數以一百零五戶隔位除之布算如後五分巳盡二錢巳盡九兩五五除二十五下位除二更於第三位除五通盡八十五八除四十下位除四十歸除二十以上至百千萬以上首位有二三四五六七八九者皆以此法分之從首位大數算起用乘法還元唯有歸除法更奇將身歸了次除之
