body:
  text: 銖搭入零一十八銖共四萬七千六百一十銖別置一十一兩以銖法二十四乘之得二百六十四搭上六銖共二百七十為法以法除四萬七千六百一十得一百七十六匹餘九十銖以匹法四十二乘之得三千七百八十仍以二百七十歸除之得一丈四尺今有麵二百三十七斤一十四兩每斤價鈔一錢二分五釐問該鈔幾何答曰二十九兩七錢三分四釐三毫七絲五忽法曰置二百三十七斤通作三千七百九十二兩搭上一十四兩共三千八百六兩別置斤價一錢二分五釐以斤法十六除之得七八一二五為法以法乘三千八百六兩得數今有粉九十八斤七兩每兩價鈔八分五釐四毫問該鈔幾何
