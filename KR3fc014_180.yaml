body:
  text: 幾何答曰一畝一百九十二步即八分法曰置周闊折半得三十六步別以徑闊二十四步折半得十二步以十二步乘三十六步得四百三十二步以畝法除之又法見後今有環田外周一百二十步中周八十四步徑六步問該田幾何答曰二畝一百三十二步即五分五釐法曰置外周併入中周共二百四步折半得一百二步以徑六步乘之得六百一十二步以畝法除之今有覆月田又弧矢田闊二十四步徑十二步問該田幾何答曰二百一十六步即九分法曰置弦闊二十四步以徑十二步乘之得二百八十八步四歸得七十二步又三因之
