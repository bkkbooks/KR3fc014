body:
  text: 一歸答曰一百三十二兩六錢六分法曰置鈔數以人數歸之布算如後二分逢二進一十盡三錢逢二進一十起了本身二數而進一十於上位尙餘一二一添作五將所餘一數變作五五兩逢四進二十起了本身四數而進二十於上位尙餘一二一添作五將所餘一數變作五六十逢六進三十起了本身六數而進三十於上位二百逢二進一十起了本身二數而進一十於上位三歸三人分之每人該八十八兩四錢四分二分逢三進一十盡三錢逢三進一十起了本身三數而進一十於上位尙餘一
