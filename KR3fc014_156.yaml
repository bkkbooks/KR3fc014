body:
  text: 答曰一百三十四兩五錢五釐法曰置九十八斤通作一千五百六十八兩搭上七兩共一千五百七十五兩以每兩價鈔八五四乘之今有銀一十八兩九錢四分每銀一錢買麵五斤一十二兩問該麵幾何答曰一千八十九斤八錢法曰置麵五斤通作八十兩搭上一十二兩共九十二兩別置銀一十八兩九錢四分以九十二乘之得一七四二四八卻以斤法除之今有粉三百四十九斤四兩每粉二斤一十二兩賣銀一錢問該銀幾何答曰一十二兩七錢法曰置三百四十九斤以四兩為二五通三四九二五別置二斤以一十二兩為七五通二五七以二七五歸除三四九二五合所問今有麻九稱七斤四兩每二斤八兩
