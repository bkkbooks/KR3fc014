body:
  text: 小數也論氣力差發分內無數分上爲大數分下爲小數也論箇箇內無數箇上爲大數箇下爲小數也如數相除不及者大卻以爲小小者卻以爲大凡大小數相減若空者皆爲大數大除小者倂爲小小除大者倂爲大十一百二千三萬四十萬五百萬六千萬七萬萬八分一釐二毫三絲四忽五微六纖七沙八塵九埃十升一合二勺三抄四撮五圭六粟七粒八因法二以上單位算者用之從末位小數算起用九歸還元合數九因須熟記呼如下位算爲先變其身數呼求十從上因之十進前
