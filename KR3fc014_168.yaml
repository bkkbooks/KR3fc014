body:
  text: 法曰置上方八尺自相乘得六十四尺別置下方一丈二尺自乘得一百四十四尺又以下方一丈二尺乘上方八尺得九十六尺併三位數三百四尺又以深一丈二尺六寸乘之得三千八百三十尺四寸又以三歸之得一千二百七十六尺八寸卻以斛法除之今有圓窖一口上周一丈八尺下周三丈深一丈二尺問積米幾何答曰二百三十五石二斗法曰置上周一丈八尺自乘得三十二丈四尺又置下周三丈自乘得九十丈又以下周三丈乘上周一丈八尺得五十四丈併三位數得一百七十六丈四尺又以深一丈二尺乘之得二千一百一十六丈八尺以三十六歸除之得五十八丈八尺卻以斛法除之今有平地堆米下周二丈七尺高六尺問積
  hash: sha256:6b55e280f9fe736351eb3f9c331af295e7f86d6d2e81f5ca3ca3529bfb1090d6
