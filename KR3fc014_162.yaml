body:
  text: 幾何答曰三百八十四箇法曰置長一十三箇減訖闊八箇餘五箇折半得兩箇半添半箇作三箇以此三箇添入長內共一十六箇又以闊八箇因之得一百二十八箇別以闊八箇添一箇作九箇就以九乘一百二十八得一千一百五十二卻以三歸之得數今有平尖草一垛底脚二十六堆問該積幾何答曰三百五十一堆法曰置脚二十六堆別置二十六添一作二十七以二十七乘二十六得七百二又折半合所問今有三角果一垛脚底三十六箇問積幾何答曰八千四百三十六箇法曰置三十六箇別置三十六添一作三十七以三十七乘三十六得一千三
