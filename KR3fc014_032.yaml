body:
  text: 假令每斤價鈔一兩一錢問該鈔幾何加一答曰二百九十四兩八錢法曰加者以本身爲一卻於一之外加添也置都物數以每斤價加之然斤價不用首位之一如一兩一錢則只以一錢加之一兩二錢則只以二錢加之也今列布算之方于後八斤一八加八不動本身八數伹以八加於下位六十一六加六不動本身六數但以六加於下位二百一二加二不動本身二數但以二加於下位假令每斤一兩三錢加三答曰該三百四十八兩四錢八斤三八加二十四加二十在本身更於下位加四六十三六加一十八加一十在本身更於
