body:
  text: 法曰置上廣併入下廣共三丈六尺折半得一丈八尺以高三丈六尺乘之得六十四丈八尺又以長二千五百二十尺乘之得一十六萬三千二百九十六丈卻以常積六十四尺爲法除之今有開渠長一千八百尺上廣七尺下廣九尺深四尺每人一日自穿運常積一百四十四尺令二百人開之問幾日畢答曰二日開畢法曰置上廣併入下廣共一丈六尺折半得八尺以深四尺乘之得三丈二尺又以長一千八百尺乘之得五萬七千六百尺別置一日積一百四十四尺以二百人乘之得二萬八千八百爲法以法除五萬七千六百得二日凡不切於初學者不及詳載洪武癸丑春廬陵李氏明經堂刊新刊詳明筭法卷下畢
