body:
  text: 五如五則卽隔位下矣乘除須記行數如中間有隔一位二位三位者若差一位則以十爲百以百爲十矣一撞歸起一不同以五歸言之撞歸見五卽五歸歸不得無除作九五是也五歸見四無除則五四位作八卻起一於下位還五以除如數少又起一還五以降也餘仿此一乘除見揔大乘大者併存添小乘小者併存減大多小者減爲大小多大者減爲小大除大數實多法少減爲大法多實少減爲小小除小數實多法少減爲小法多實少減爲大大除小數大多小者併爲小小除大數小除大者併爲大乘者存身更添一是大數也若爲小者卻減一除則不滿卻減一是大數也若爲
