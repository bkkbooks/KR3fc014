body:
  text: 第五等每户四斗八升二勺該二十四石一升法曰置官配粟別置第一等二十二戶以萬通之爲二十二萬又置第二等三十六戶以七千乘之得二十五萬二千又置第三等四十二戶以四千九百乘之得二十萬五千八百又置第四等四十八戶以三千四百三十乘之得一十六萬四千六百四十又置第五等五十戶以二千四百一乘之得一十二萬五十併五位數總九十六萬二千四百九十爲法以法除官配粟得二石是第一等一戶所出就退位七因是第二等一戶所出又七因是第三等一戶所出又七因是第四等一戶所出又七因是第五等一戶所出卻以第一等二十二戶乘第一等一戶所出得第一等戶總數二三四五等戶仿此
