body:
  text: 有歸若無除數起一回將元數施或遇本歸歸不得撞歸之法莫敎遲若人識得中間意算學雖深可盡知今有五十五人分鈔六百五十八兩九錢間每人得鈔幾何答曰一十一兩九錢八分法曰歸除者先歸而後除是合九歸定身除二法爲一也置鈔數以人數五十五歸除之布算如後九錢五八除四十盡八兩逢五進一十起五數而進一十於上餘八五九除四十五本身除四十更於下位除五餘四五四倍作八變餘四作八五十逢五進一十起五數而進一十於上餘五
