body:
  text: 該田幾何答曰二畝九十二步卽三分八釐三毫三絲三忽法曰置中闊折半得一十一步以長五十二步乘之得五百七十二步以畝法除之鼠矢田半梭田皆同此法今有眉田上周二十七步下周二十五步中徑六步問該田幾何答曰七十八步卽三分二釐五毫法曰置上周併入下周共五十二步折半得二十六步別以徑六步折半得三步以三步乘二十六步合所問今有牛角田東長一十八步西長一十六步北闊一十二步問該田幾何答曰一百二步卽四分二釐五毫法曰置東長併入西長共三十四步折半得一十七步別置北闊折半得六步以六步乘十七步合所問今有圓田周闊七十二步徑二十四步問該田
