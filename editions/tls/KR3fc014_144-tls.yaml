body:
  text: 每端四十八尺價鈔九兩五錢問該布幾何答曰一十三端一丈六尺八寸法曰置鈔數以每端價鈔九兩五錢歸除之得一兩三錢三分五釐又以端法四十八尺乘之得六十四丈八寸於內以六十二丈四尺作一十三端又餘一丈六尺八寸今有鈔一百二十四兩五錢四分五釐買絹每疋長三丈八尺價鈔一十一兩五錢問該絹幾何答曰一十疋三丈一尺五寸四分法曰置鈔數以每疋三十八尺乘之得四千七百三十二兩七錢一分又以每疋價一十一兩五錢除之得四十一丈一尺五寸四分於內以三十八丈作十疋餘三丈一尺五寸四分今有兵士三千四百七十四人每三人用衫絹七十尺每四人用絝絹五十尺每疋四十
