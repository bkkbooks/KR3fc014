body:
  text: 四十一石七斗四升七勺一抄問每畝該糧幾何答曰五升九合七勺法曰置糧三百四十一石七斗四升七勺一抄以五千七百二十四畝三分為法除之見數又以五九七乘五千七百二十四畝三分見糧㧾今有糧三百四十一石七斗四升七勺一抄該五千七百二十四畝三分問每糧一斗該幾畝幾分答曰每糧一斗該一畝六分七釐五毫四忽一微法曰置五千七百二十四畝三分以糧揔三百四十一石七斗四升七勺一抄為法除之見數又置糧揔數以每畝一六七五四二相乘見畝㧾修築修臺築隄各有法具各條之下算中有法築長城上下將來半折平
