body:
  text: 米幾何答曰四十八石六斗法曰置下周二丈七尺自乘得七十二丈九尺又以高六尺乘之得四百三十七丈四尺以三十六歸除之得一十二丈一尺五寸卻以斛法除之今有倚壁聚米下周一丈九尺高一丈二尺六寸問積米幾何答曰一百一石八升法曰置下周一丈九尺自乘得三十六丈一尺又以高一丈二尺六寸乘之得四百五十四丈八尺六寸以十八定身除之得二十五丈二尺七寸以斛法除之今有倚壁內角聚米下周一丈五尺高一丈四尺四寸問幾何答曰一百四十四石法曰置下周一丈五尺自乘得二十二丈五尺又以高一丈四尺四寸乘之得三百
