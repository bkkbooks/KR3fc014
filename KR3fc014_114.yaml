body:
  text: 答曰米一十四石八斗四升九合豆八石七斗四升一合七勺五抄麥八石八升三合一勺二抄五撮法曰置都粟折半得二十三石九斗五升以米六升二合乘之得米數別以粟一半再折半得一十一石九斗七升五合以豆七升三合乘之得豆數又別置一十一石九斗七升五合以麥五升四合乘之得六四六六五又以粟八升歸之得麥數今有甲乙丙丁四人甲出錢二十八兩七錢乙出銀二十一兩三錢丙出銀一十七兩五錢丁出銀一十二兩三錢共七十九兩八錢販到油一車賣得銀九十八兩七錢一分二釐六毫問除本銀外各該利幾何答曰甲六兩八錢一釐九毫乙五兩四分八釐一毫丙四兩一錢四分七釐五毫
