body:
  text: 換絲五兩五錢問該絲幾何答曰一十九斤八兩九錢五分法曰置九秤加五得一百三十五斤搭入七斤共一百四十二斤又以四兩爲二五通一四二二五以換絲五兩五錢乘之得七八二三七五卻以二斤八兩爲二五歸除之得三一二九五定身除六得一十九斤餘數爲八兩九錢五分也今有絲三十八秤一十三斤一十二兩賣鈔二千九百一十八兩七錢五分問每斤該鈔幾何答曰五兩法曰置鈔數別置絲數作通五百八十三斤七分五釐爲法以法歸除鈔數今有造水葉一十一萬六千九百七十二片每百片用鐵一秤六斤八兩問該鐵幾何答曰一千六百七十六秤八斤一十五
