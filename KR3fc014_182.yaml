body:
  text: 右量田地之法大槪可見唯圓田古有數法亦不甚相遠今依九章詳具干後方田正廣乘正從得積斜田箕田梯田簫田皆倂兩廣兩從各折半以乘得積圭田勾股牛角田皆半廣乘正從得積鼓田立鼓蛇田船田皆倂三廣三而一乘正從得積梭田杖鼓田皆倍中廣倂兩廣若從四而一以乘正從若廣得積弧田覆月半弦若徑以乘天若從又法倂弦矢若徑從半之以乘矢若徑得積四不等田半二長爲從半二關爲廣相乘得積五角田倂左石上下小角四而一爲從一大角爲廣相乘得積六角田倂四角半之爲從倂上下半之爲廣相乘得積環田謂中有沙石山池者倂中升周半之以乘徑得積宛田亦名磝田周徑相乘四而一得積圓田古有四法半周半徑相乘得積又周徑相乘四而一又徑自乘三之四而一又周自乘十二而一又劉徽有折術祖沖之有密率劉德全有積率其說雖大槩不甚相遠今止以十二爲算田畝紐糧今有田五千七百二十四畝三分該糧三百
