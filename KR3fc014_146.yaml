body:
  text: 二尺問該絹幾何答曰二千九百六十三匹三丈九尺衫絹一千九百三十匹褲絹一千三十三匹三丈九尺法曰置兵士數別置三人以五十尺因之互乘也得一百五十又別置四人以七十尺因互乘也得二百八十並二數共四百三十為法以法乘兵士得一百四十九萬三千八百二十別以三四相因得一十二以十二除一百四十九萬三千八百二十得一十二萬四千四百八十五尺卻以匹法四十二尺除之得總絹數如欲見衫褲各另數置兵士以七十乘之得二十四萬三千一百八十用三人歸之得衫絹別置兵士以五十尺因得一十七萬三千七百用四人歸之得褲絹今有借了白布一端長五丈二尺闊二尺一寸為無本色布還只有常市闊一尺六寸問
