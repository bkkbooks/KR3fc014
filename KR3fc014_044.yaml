body:
  text: 變本身作二三如六乘四位每兩價鈔二兩三錢七分五釐該八十六兩六錢八分七釐五毫五錢先於下位下五五二十五次於第三位下五七三十五又次於第二位下三五一十五後變本身作二五一十六兩先於下位下五六三十次於第三位下六七四十二又次於第二位下三六一十八後變本身作二六一十二三十先於下位下三五十五次於第三位下三七二十一又次於第二位下三三如九後變本身作二三如六今有鈔四十八兩六錢假令每兩買銀四錢七分問該銀幾何乘二位答曰二十二兩八錢四分二釐法曰置鈔數以每兩銀價乘之布算同前更不重述乘三位每兩買銀四錢五分五釐該二十二兩一錢一分三釐乘四位每兩買銀四錢三分七釐五毫該二十一兩二錢六分二釐五毫
