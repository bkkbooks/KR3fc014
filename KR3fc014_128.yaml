body:
  text: 四百七十七丈二寸四分得六十尺是第一等一戶所出也就退位六因是第二等一戶所出又六因是第三等一戶所出又六因是第四等一戶所出又六因是第五等一戶所出卻以第一等二十五戶乘第一等一戶所出卽第一等總數二三四五等仿此今有官配粟一百九十二石四斗九升八合令五等人戶從上作三七出之第一等二十二戶第二等三十六戶第三等四十二戶第四等四十八戶第五等五十戶問每戶及逐等各該幾何答曰第一等每戸二石該四十四石第二等每戸一石四斗該五十石四斗第三等每户九三八升該四十一石一斗六升第四等每户六斗八升六合該三十二石九斗二升八合
