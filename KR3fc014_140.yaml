body:
  text: 答曰銀三十二兩六錢買李四萬一千七百二十八箇銀二十五兩三錢買桃四萬一千四百九十二箇法曰置銀總數以桃一百六十四箇乘之得九萬四千九百五十六箇於內減訖桃李共數餘一萬一千七百三十六箇別置桃一百六十四箇於內減訖李一百二十八箇餘三十六箇為法以法除共數一萬一千七百三十六箇得三十二兩六錢是買李之銀於共銀內減訖買李銀餘二十五兩三錢是買桃之銀卻以一錢買到李箇數乘買李之銀得李總價總桃價仿此端匹四十為匹五為端或減還加二尺寬端匹乘來方見尺尺求端匹法除看今有布一尺賣鈔一錢九分三釐問一端長
