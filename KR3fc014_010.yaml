body:
  text: 一九如九二九十八三九二十七四九三十六五九四十五六九五十四七九六十三八九七十二九九八十一此止一半倒念上一字又一半也斛粟數多少之法謂之量量者斛斗之揔名起於粟粟者粟之一粒也六粟為圭十圭為撮十撮為抄十抄為勺十勺為合十合為升十升為斗十斗為石丈尺數長短之法謂之度度者尺寸之揔名起於忽忽者蠶口所出絲也十忽為絲十絲為毫十毫為釐十釐為分十分為寸十寸為尺十尺為丈四丈為匹五丈為端斤稱數輕重之法謂之衡衡者斤兩之揔名稱之橫木曰衡稱椎曰權十黍為絫纍同十絫為銖六銖為分四分為兩十六兩為斤積三百八十四銖二斤二兩為一裏十五斤為稱三十斤為鈞四鈞為石
