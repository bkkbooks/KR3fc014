body:
  text: 兩六錢八分法曰置水葉數別置一秤通作一十五斤搭上六斤半共二十一斤半以二一五乘水葉數得二五一四八九八以秤法定身除五得一千六百七十六秤下有八斤九分八釐以八斤搭上於前數內餘九分八釐以斤法十六乘之得一十五兩六錢八分也堆垛圓尖等法見倉窖法內缶甁堆垛要推詳脚底先將闊減長餘數折來添半箇併歸長內闊乘相再將闊搭一乘實三以除之數便當若算平尖只添一乘來折半法如常三角果垛也須知脚底先求幾箇兒一二添來乘兩遍六而取一不差池要知四角盤中果添半仍添一箇隨乘此數來以爲實如三而一去除之今有酒甁一垛闊八箇長一十三箇問該積
