body:
  text: 一五除五本身除一十於下位還五餘四五四倍作八變餘四作八六百逢五進一十起五數而進一十於上餘一一五除五本身除一十於下位還五今有織絹八十六丈四尺計用絲三百二十兩問每兩該絹幾何答曰二尺七寸法曰置絹數以絲數三二歸除之布算如後四尺巳盡六丈逢三進一十起三數而進一十於上餘一二七除一十四本身除一十更於下位除四皆盡八十逢六進二十起六數而進二十於上餘二二二除四只於下位除四本身依舊餘二
