body:
  text: 今有官配米二百二十五石三斗六升令五等人戶從上作二八出之第一等四戶第二等八戶第三等一十五戶第四等四十一戶第五等一百二十戶問每戶及逐等各該幾何答曰第一等每户二石五斗該一十石第二等每戸二石該一十六石第三等每戸一石六斗該二十四石第四等每户一石二斗八升該五十二石四斗八升第五等每戸一石二升四合該一百二十二石八斗八升法曰置官配米別置第一等四戶以萬通之爲四萬又置第二等八戶以八千乘之得六萬四千又置第三等一十五戶以六千四百乘之得九萬六千又置第四等四十一戶以五千一百二十乘之得二十萬九千九百二十又置第五
