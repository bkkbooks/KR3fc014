body:
  text: 解法卻將除見數一升一合不差爭今有方倉一所長四丈七尺廣三丈一尺高九尺問積米幾何答曰五千二百四十五石二斗法曰置長四丈七尺以廣三丈一尺乘之得一千四百五十七尺又以高九尺乘之得一萬三千一百一十三尺卻以斛法二尺五寸歸除之今有圓倉一所周二丈四尺高一丈積米幾何答曰一百九十二石法曰置二丈四尺就以二丈四尺乘之得五百七十六又以高一丈乘之得五千七百六十尺又以十二定身除之得四百八十尺卻以解法二五歸除之今有方窖一口上方八尺下方一丈二尺深一丈二尺六寸問積米幾何答曰五百一十石七斗二升
  hash: sha256:332f51cd6b93e03a6451885fb8aa5683a2e91e29abbbeabb0885a80d5373d17c
