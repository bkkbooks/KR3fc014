body:
  text: 九錢二三除六定本身存二於本身除一十下位還四七兩二三除六不動本身只於下位除六六十三五除一十五定本身存五於本身除一十更於下位除五糴到一十五石該四兩五錢三分二釐除五八分二五除一十定本身存二就於本身除一十恰盡九錢三五除一十五定本身存三本身除一十更於下位除五七兩五五除二十五定本身存五於本身除二十更於下位除五六十四五除二十定本身存四就於本身除二十糴到一十七石該三兩九錢九分八釐八毫二絲三忽五微三纖除七餘五呼二七除一十四定本身存二就除十四不盡故搭上作三纖也餘九呼五七除三十五定本身存五就除四十於
