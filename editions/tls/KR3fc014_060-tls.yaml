body:
  text: 九歸九人分之每人該二十九兩四錢八分二分逢九進一十盡三錢隨身下加七五兩逢九進一十餘四隨身下加四不動本身只於下位加四六十隨身下加八不動本身只於下位加八二百隨身下加二不動本身只於下位加二定身除卽減法也一十一百一千一萬之類但首位一數者以此法分之從首位大數算起用加法還元減法須知先定身得其身數始爲眞法雖有一何曾用身外除零妙入神今有鈔六十七兩九錢八分糴米假令糴到一十一石問每石該鈔幾何答曰六兩一錢八分除一法曰定身除者先定本身而後除之也就以本身爲一置都鈔數不除首位之一但以次位餘數除之今列布算方于
