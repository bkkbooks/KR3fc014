body:
  text: 三二六十二變本身作六十更於下位加二今有麻二十四斤半賣鈔八兩八錢二分問每斤該鈔幾何答曰三錢六分法曰置鈔數以斤數二四五歸除之布算如後二分五六除三十盡八錢逢二進一十起二數而進一十於上四六除二十四本身除二十下位除四八兩逢六進三十起六數而進三十於上三四除一十二本身除一十下位除二三五除一十五下位除二十第三位還五二一添作五變餘一作五今有鈔四百八十八兩九錢五分買錦每尺
