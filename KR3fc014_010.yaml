body:
  text: 一九如九二九十八三九二十七四九三十六五九四十五六九五十四七九六十三八九七十二九九八十一此止一半倒念上一字又一半也斛粟數多少之法謂之量量者斛斗之揔名起於粟粟者粟之一粒也六粟爲圭十圭爲撮十撮爲抄十抄爲勺十勺爲合十合爲升十升爲斗十斗爲石丈尺數長短之法謂之度度者尺寸之揔名起於忽忽者蚕口所出絲也十忽爲絲十絲爲毫十毫爲釐十釐爲分十分爲寸十寸爲尺十尺爲丈四丈爲匹五丈爲端斤秤數輕重之法謂之衡衡者斤兩之揔名秤之横木曰衡秤椎曰權十黍爲絫纍同十絫爲銖六銖爲分四分爲兩十六兩爲斤積三百八十四銖二斤二兩爲一裏十五斤爲秤三十斤爲鈞四鈞爲石
