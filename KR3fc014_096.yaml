body:
  text: 今有糧四十三船該三萬七千四百一十石除際留一十四船支二十九船贍軍問各該米幾何答曰際留糧一萬二千一百八十石贍軍糧二萬五千二百三十石法曰置糧三萬七千四百一十石以贍軍二十九船乘之得一百八萬四千八百九十石却以四十三船分之得贍軍糧數別置糧數於內除訖贍軍糧即得際留糧數今有絹四十四萬七百九十一匹計用車五百三十三兩裝載今只裝了三百四十八車外有一百八十五車聽候載問各該絹幾何答曰見裝絹二十八萬七千七百九十六匹聽候絹一十五萬二千九百九十五匹
  hash: sha256:d742667baa8c5496a6325060de8665294be3c9cbcc109e7ee5e2eb34e17f94bd
