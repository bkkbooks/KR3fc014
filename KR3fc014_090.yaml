body:
  text: 於楤內除五於商位續下五除二五一十盡約分數有參差不可齊須憑約法命分之法為分母實為子不與差分一例推今有九十八分之四十二問約之得幾何答曰七分之三法曰置九十八分別置四十二分於九十八分中減了兩箇四十二餘一十四分再於四十二分中減了兩箇一十四亦餘一十四分子母相均就以為法各定身除之九十八分乃是七箇一十四分四十二分乃是三箇一十四分故曰七分之三今有二十一分之十四問約之得幾何答曰三分之二法曰置二十一分別置一十四分於二十一分中減了十四分餘七分再於一十四分中減了七分亦餘七分子母相
