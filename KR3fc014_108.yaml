body:
  text: 寸買顏色染緋羅六丈二尺五寸問各該幾何答曰緋羅五十二丈七尺三寸四分三釐七毫五絲顏色羅一十四丈七尺六寸五分六釐二毫五絲法曰置總羅以染羅六丈二尺五寸乘之得四百二十一丈八尺七寸五分別置染羅六丈二尺五寸搭上買顏色羅共八丈為法除四百二十一丈八尺七寸五分得緋羅數總內減緋羅得顏色羅數差分差分之法併來分須要分教一分成將此一分為定實以乘各數自均平今有錢鈔一百二十一兩一錢五分六釐五毫糴米麥豆三色議要一分米二分麥三分豆米每斗價九分二釐麥每斗價八分五釐豆每斗價三分六釐三色併錢鈔各該幾何
