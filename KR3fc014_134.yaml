body:
  text: 等一百二十戶以四千九十六乘之得四十九萬一千五百二十併五位數共九十萬一千四百四十爲法以法除官配米得二石五斗是第一等一戶所出就八因是第二等一戶所出又八因是第三等一戶所出又八因是第四等一戶所出又八因是第五等一戶所出卻以第一等四戶乘第一等一戶所出二石五斗得揔二三四五等仿此今有甲乙丙三人共分鈔一百兩須要乙鈔如甲三分之二丙少如甲二十八兩問各該幾何答曰甲四十八兩乙三十二兩丙二十兩法曰置共鈔二百兩於內減訖二十八兩餘七十二兩三歸得二十四兩是三分之一也就倍之得四十八兩是甲得之數又以四十八兩三歸得一十六兩倍之得
