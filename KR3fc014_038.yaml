body:
  text: 後五分先於下位加五五二十五後於本身加五八四十七錢先於下位加五七三十五後於本身加七八五十六四兩先於下位加五四二十後於本身加四八三十二二十先於下位加二五一十後於本身加二八一十六三百先於下位加三五十五後於本身加三八二十四今有羅二百四十六匹每匹價鈔一十二兩七錢五分問該鈔幾何加三位答曰三千一百三十六兩五錢法曰置羅數以每匹價鈔加之但不加首位一十兩只加二兩七錢五分也布算如後六匹先於第三位加五六三十次於下位加六七四十二後於本身加二六一十二四十先於第二位加四五二十次於下位加四七二十八後於本身加二四如八蓋不動本身只加八於下位也二百先於第三位加二五一十次於下位加二七一十四後於本身加二二如四蓋不動本身只加四於下位也
