body:
  text: 小者卻添一數大數乘大數相併存身添一小數乘小數相併存身減一大小數相乘相減存身上進一位術曰如大數多少數相減餘為大數也存身添一是上進一位也如小數多大數相減餘為小數也存身減一是上進一位也大數除大數相減不滿法下退一位術曰如實多法少相減餘為大數也不滿法減一是下退一位是也如法多實少相減餘為小數也不滿法添一是下退一位也小數除小數相減不滿法下退一位術曰如實多法少相減餘為小數也不滿法添一是下退一位也如法多實少相減餘為大數也不滿法減一是不退一位也
