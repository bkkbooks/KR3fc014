body:
  text: 大數除小數相併餘爲小數也不满法添一下退一位小數除大數相併餘爲大數也不满法減一下退一位乘者同名相併異名卻減乘者存身更深一爲小卻反之除者同名相減異名卻加除則不滿卻減一爲小亦反之或乘或除見錢併糧石內加減一虛數其餘諸物皆無虛數並依十一百二之數也大數見大數爲同名小見小同小數見大數爲異名大見小同論糧石斗內無數斗上爲大數斗下爲小數也論斤斤內無數斤上爲大數斤下爲小數也論錢鈔錢內無數錢上爲大數錢下爲
