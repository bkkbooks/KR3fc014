body:
  text: 右歸除之法此數條巳見大意餘皆仿此唯或有歸而無除則起此已歸一算而以元數復置於下位然後視其多寡而算之又有撞歸之法皆變通之術也亦不可不知今具列如後見二無除作九二見三無除作九三見四無除作九四見五無除作九五見六無除作九六見七無除作九七見八無除作九八見九無除作九九求一求一明敎置兩停二三折半四三因五之以上二因見去一除零要定身今有緜二百四十斤賣鈔四百五十八兩六錢七分問每斤該鈔幾何答曰一兩九錢一分一釐一毫二絲五忽法曰求一者求分母一數居首而爲法也蓋定身除首位皆一不待求也今或二三
