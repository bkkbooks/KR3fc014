body:
  text: 今有人一日淘金五分三釐五毫二十四人淘金三十二日間幾何答曰四十一兩八分八釐法曰置一日金數五分三釐五毫以二十四人乘之得一兩二錢八分四釐又以三十二日乘之除數釋例凡除法或單位九歸或就身減或歸除三者皆除也隨位數異其名爾除散也散總積為細零也布算皆從上記九歸十以下單位分者用此法先從首位大數算起用因法還元九歸之法乃分平湊數從來有見成數若有多歸作十歸如不盡搭添行一歸一歸不須歸其法故不立二歸二一添作五逢二進一十三歸三一三十一三二六十二逢三進一十四歸四一二十二四二添作五
