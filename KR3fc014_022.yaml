body:
  text: 今有米二百七十八石六斗糶之假令每石價鈔二兩問該鈔幾何二因答曰五百五十七兩二錢先從末位六斗算起法曰置都米數以每石價鈔因之今列布算之方于後六斗二六一十二變本身六斗作一十更於下位下二八石二八一十六變本身八石作一十更於下位下六七十二七一十四變本身七十作一十更於下位下四二百二二如四退了本身二數於下位下四假令每石價鈔三兩三因答曰八百三十五兩八錢六斗三六一十八變六斗作一十更於下位下八八石三八二十四變八石作二十更於下位下四七十三七二十一變七十作二十更於下位下一
