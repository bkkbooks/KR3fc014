body:
  text: 之每十疋合稅羅一尺已稅了八疋卻貼得鈔一兩九錢今將鈔一十三兩三錢買之問該羅幾何答曰四十二尺法曰置羅三千三百疋以一尺乘之得三百三十尺以十疋除之得三十三疋別置八疋以每疋四十二尺通之得三百三十六尺於內減了合稅羅數三百三十尺只有六尺以此六尺乘今將鈔一十三兩三錢得七百九十八尺卻以貼得鈔一兩九錢爲法除之得今買羅尺數元有銀一千七百二十八兩出關稅之九而取一巳稅了銀二百兩卻貼得鈔一百兩今將銀五十八兩賣之問該鈔幾何答曰七百二十五兩法曰置今將銀五十八兩以元貼鈔一百兩乘之得五千八百兩別置元有銀一千七百二十八兩以稅法九歸之得一百
