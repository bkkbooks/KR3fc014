body:
  text: 五丈二尺該鈔幾何答曰一十兩三分六釐法曰置鈔數以端法五十二尺乘之今有絹一丈八尺賣鈔五兩五錢二分問一疋長四丈二尺該鈔幾何答曰一十二兩八錢八分法曰置鈔數以疋法四十二尺乘之得二百三十一兩八錢四分卻以一丈八尺定身除之今有羅二十三疋二丈三尺每疋四丈二尺共賣鈔二百三十一兩四錢二分六釐每尺問該鈔幾何答曰二錢三分四釐法曰置羅二十三疋以疋法四十二乘之得九十六丈六尺搭入二丈三尺共九十八丈九尺爲法別置鈔二百三十一兩四錢二分六釐以九八九歸除之今有鈔一百二十六兩八錢二分五釐置布
