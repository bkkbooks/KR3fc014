body:
  text: 百三十二又別置三十六添二作三十八以三八乘一三三二得五萬六百一十六卻以六歸之今有四角果一垛底脚三十六箇問積幾何答曰一萬六千二百六箇法曰置三十六箇別置三十六添一作三十七以三七乘三六得一千三百三十二又別置三十六添半箇作三六五以三六五乘一三三二得四萬八千六百一十八以三歸之盤量倉窖古斛法以二尺五寸爲一石方倉長用闊相乘堆與圓倉周自行各再以高乘見積唯圓十二一中分尖堆法用三十六倚壁須分十八停內角聚時如九一外角三九積分明若還方窖兼圓窖上下周方各自乘乘了另將上乘下併三爲一再乘深如三而一爲方積三十六兮圓積成
