body:
  text: 法曰置絹數以車五百三十三兩分之得八百二十七疋卻以裝了三百四十八車乘之得見裝絹數於揔絹內減訖見裝絹卽得聽候絹數今有李客出銀一十二兩三錢六分張客出銀一十九兩六錢四分共三十二兩營運折了七兩今只有二十五兩問各人合分銀幾何答曰張客一十五兩三錢四分三釐七毫五絲李客九兩六錢五分六釐二毫五絲法曰置張客銀一十九兩六錢四分以只有二十五兩乘之得四百九十一兩卻以共銀三十二兩爲法歸除之得張客合分銀數於揔銀內減了張客合分銀又減折了七兩餘爲李客合分銀數今有羅三千三百疋每疋四十二尺出關稅
