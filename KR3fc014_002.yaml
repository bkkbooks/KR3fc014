body:
  text: 其原皆本於黃鐘也黃鐘之長九寸空圍九分聲中黃鐘之律陽聲之始陽氣之動也九者陽之成也加一寸成十日尺是尺寸之始也其空容黍米千二百粒為勺是斗斛之始也其重十二銖是斤稱之始也大略若此數之理顯小學易明故居六藝之末然非專心致志亦莫極其妙請我言之夫學者初習因歸則口授心會至於撞歸起一時有差謬既貫通諸法或設問一數於乘除莫知所措辨而析之是明布算之方矣而數之錯綜者又須明立法之道以布算是乃用算之術也深究其理可會於心乃師説所不能盡但目熟之其理悉見聊若經學之難明理學之難窮也舊本極為詳明訪求之久可復可得皆隱其訣存一亡十徒以詗人之初心數以所聞如舊法分上下二卷盡其説壽諸梓以庚辰傳庶初學之一助云爾安正
