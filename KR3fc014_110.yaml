body:
  text: 答曰米三十二石七斗四升五合該價三十兩一錢二分五釐四毫麥六十五石四斗九升該價五十五兩六錢六分六釐五毫豆九十八石二斗三升五合該價三十五兩三錢六分四釐六毫法曰置總鈔數別置米斗價九分二釐又置麥斗價八分五釐二因得一錢七分又置豆斗價三分六釐三因得一錢八釐併三件共三錢七分為法以三七歸除總鈔即見米數二因是麥數三因是豆數以各色每斗價乘之得各色總價今有鈔三十七兩八錢九分糴四色糧斛數皆均平粟每斗價鈔三分四釐豆每斗價鈔二分五釐白米每斗價鈔四分八釐
