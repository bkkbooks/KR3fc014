body:
  text: 之得三千三十六步以畝法除之今有三廣田南闊二十八步北闊四十步中闊一十八步長一百四十步問該田幾何答曰一十五畝四十步卽一分六釐六毫六絲六忽法曰置中闊一十八步加一倍得三十六步又併南闊北闊共一百四步如四而一得二十六步以長一百四十步乘之得三千六百四十步以畝法除之今有圭田亦同勾股法蛇形田大鼓田皆同三廣法今有四不等田東長二十八步西三十二步南闊四十步北五十步問該田幾何答曰五畝一百五十步卽六分二釐五毫法曰併東西長折半得三十步別置南北闊折半得四十五步以四十五步乘三十步得一千三百五十步以畝法除之抹角田同四不等法今有梭田中闊二十二步直長五十二步問
