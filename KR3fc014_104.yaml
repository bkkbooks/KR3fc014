body:
  text: 答曰六百四十里法曰置今與鈔六十七兩六錢八分以元行道一千里乘之得六萬七千六百八十又以元載重一千二百斤乘之得八千一百二十一萬六千別置元載一千二百斤搭上今添四百九十二斤共一千六百九十二斤又以元價七十五兩乘之得一十二萬六千九百為法以此除八千一百二十一萬六千得今合行里數元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今與鈔七十六兩五錢行一千七百里問載重幾何答曰七百二十斤法曰置元載重以元行道乘之得一百二十萬又以今與鈔七十六兩五錢乘之得九千一百八十萬別置今行道以元與鈔乘之得一十二萬七千五百為法以此除九千一百八十萬即得合載斤數
