body:
  text: 均就以爲法各七歸之二十一分乃是三箇七分一十四分乃是兩箇七分故曰三分之二今有絲二百五十二分斤之一百四十四問約之得幾何答曰七分斤之四法曰置二百五十二別置一百四十四更相減損各得三十六以此爲法各以三十六歸除之今有米一百三十五分斛之七十五問約之得幾何答曰九分斛之五法曰置一百三十五別置七十五更相減損各得一十五爲法定身除之新刊詳明筭法卷上
