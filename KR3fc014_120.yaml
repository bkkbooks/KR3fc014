body:
  text: 戶乘上等一戶所出得上等總中下戶仿此今有官配白米二百七十八石五斗令三等人戶出之上等二十戶每戶多中等七斗中等五十戶每戶多下等五斗下等一百一十戶問每戶及逐等各幾何答曰上等每户二石四斗七升五合該四十九石五斗中等每戶一石七斗七升五合該八十八石七斗五升下等每户一石二斗七升五合該一百四十石二斗五升法曰置官配米數別置上中二等共多一石二斗以上等二十戶因之得二十四石又置中等戶多五斗以中等五十石因之得二十五石併二數共四十九石於官米內減訖四十九石餘二百二十九石五斗別以上等二十戶中等五十戶
