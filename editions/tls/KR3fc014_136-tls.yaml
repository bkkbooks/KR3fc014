body:
  text: 三十二兩是乙得甲三之二也別置甲四十八兩減去二十八兩餘二十兩是丙得之數今有甲乙丙三人共分鈔一百兩只云甲多乙五兩丙得鈔如乙七分之五問各該幾何答曰甲四十兩乙三十五兩丙二十五兩法曰置共鈔一百兩於內減訖五兩餘九十五兩作十九分分之定身除九每分得五兩七因是乙得之數五因是丙得之數以乙鈔加五兩是甲得之數和合差分差分和合法尤精高價先乘共物情卻用都錢減今數餘留爲實甚分明別將二價也相減用此餘錢爲法行除了先爲低物價自餘高價物方成今有麻麥共三十八石七斗二升總糶鈔五十九兩二錢四分九釐七毫麻每斗價鈔一
