body:
  text: 第二等每户三丈六尺該二十七疋第三等每戸二丈一尺六寸該二十五匹三丈六尺八寸第四等每户一丈二尺九寸六分該一十六匹八尺第五等每戸七尺七寸七分六釐該一十二匹二丈五尺四寸四分法曰置都絹每疋四丈通作四百七十六丈搭上一丈二寸共四百七十七丈二寸四分別置第一等二十五戶以萬通之爲二十五萬又置第二等三十戶以六千乘之得十八萬又置第三等四十八戶以三千六百乘之得一十七萬二千八百又置第四等五十戶以二千一百六十乘之得一十萬八千又置第五等六十五戶以一千二百九十六乘之得八萬四千二百四十併五位數得七十九萬五千四十爲法以法除官配絹
