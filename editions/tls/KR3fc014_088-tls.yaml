body:
  text: 每人該糧幾何答曰六斗五升七合法曰商除者商量而除之也此一術亦兼九歸定身除歸除三法旣通歸除不必學此但開方則必須商除故不可廢其法置揔數商量除訖卻將所商之數別置一位下之逐位續商盡而止有不可盡者則之命置糧數先商六六三十六於揔數內除三十六卻別置商位下六又商六五三十於揔內除三十於商位續下五又商六七四十二於揔內除四十二商盡於商位續下七今有鈔四百二十九兩買布一百二十疋問每疋該鈔幾何答曰三兩五錢七分五釐法曰置鈔數商一三如三於揔內除首位三別置商位下三除二三如六只於揔內除六別位不須下續商一五如五於揔內除五於商位續下五除二五一十只於揔內除一十商位不須下續商一七如七於㧾內除七於商位續下七除二七一十四於揔內除一十四商位不須下續商一五除五
