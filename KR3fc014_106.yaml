body:
  text: 就物抽分抽分法就物中抽脚價乘他都物求別用脚錢搭物價以其爲法要除周除來便見脚之揔餘者皆爲主合留算者不須求別訣只將此法記心頭今有粟一百三十七石八斗欲雇船裝載每粟一斗直時價一錢二分五釐議脚價三分五釐爲無錢就粟內抽分問該脚粟幾何答曰脚價粟三十石一斗四升三合七勺五抄主粟一百七石六斗五升六合二勺五抄法曰置粟數以脚價乘之得四百八十二石三斗別置每斗價搭上脚價共一錢六分爲法以法除四百八十二石三斗得今合抽今脚粟數於總內減脚粟卽主粟今有羅六十七丈五尺於內抽一丈七尺五
