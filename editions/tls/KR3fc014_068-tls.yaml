body:
  text: 七十二不盥故搭上作九毫八分九七除六十三本身有十五算不可除先以一算於下位變十卻定本身存七就除七十於下位還七九錢九七除六十三定本身存七就除七十於下位還七七兩九五除四十五定本身存五就除五十於下位還五六十九三除二十七定本身存三就除三十於下位還三今有穀九十七石八斗六升與衆人分之假令一百二十人分之問每人該穀幾何除二答曰八斗一升五合五勺除四一百四十人分之每人該六斗九升九合除六一百六十人分之每人該六斗一升一合六勺二抄五撮除八一百八十人分之每人該五斗四升三合六勺六抄六撮七圭
