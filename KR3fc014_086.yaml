body:
  text: 答曰五錢八分五釐七毫法曰置鈔三因得七九六九五別以絲四十五兩亦三因得一三五為法定身除之今有銀六百五十八兩九錢銷到銀錠五十五箇問每箇該銀幾何答曰一十一兩九錢八分法曰置都銀二因得一三一七八別以五十五箇亦二因得一一為法定身除之今有羅六十八匹用絲一千一百五十六兩問每匹該絲幾何答曰一十七兩法曰置絲數二因得二三一二別以六十八匹亦二因得一三六為法定身除之商除數中有術號商除商揔分排兩位居唯有開方須用此續商不盡命其餘今有軍六百名分糧三百九十四石二斗問
