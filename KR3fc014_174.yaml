body:
  text: 今有直田長九十三步闊三十五步問該田幾何直形答曰一十三畝一百三十五步即五分六釐三毫五絲法曰置長九十三步以闊三十五步乘之得三千二百五十五步以畝法除之見數今有梯田南闊二十六步北闊四十六步長九十八步問該田幾何梯形答曰一十四畝一百六十八步即七分法曰置南闊二十六步併入北闊四十六步共七十二步折半得三十六步又以長九十八步乘之得三千五百二十八步以畝法歸除之今有勾股田勾闊四十四步股長一百三十八步問該田幾何答曰一十二畝一百五十六步即六分五釐法曰置勾闊折半得二十二步以股長乘
