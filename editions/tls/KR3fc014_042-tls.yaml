body:
  text: 下乘之法此爲眞位數先將第二因三四五來乘遍了卻將本位破其身今有銀三十六兩五錢假令每兩賣鈔二兩五錢問該鈔幾何乘二位答曰九十一兩二錢五分法曰置銀數以每兩價鈔乘之布算如後五錢先於下位下五五二十五次變本身作二五一十六兩先於下位下五六三十次變本身作二六一十二三十先於下位下三五十五次變本身作二三如六蓋起了三數卻於下位下六乘三位每兩價錢二兩四錢五分該八十九兩四錢二分五釐五錢先於第二位下四五二十次於第三位五五二十五後變本身作二五一十六兩先於下位下四六二十四次於第三位下五六三十後變本身作二六十二三十先於下位下三四十二次於第三位下三五十五後
