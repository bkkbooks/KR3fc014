body:
  text: 丁二兩九錢一分五釐一毫法曰置賣到銀於內減訖共出本銀有利銀一十八兩九錢一分二釐六毫又以元共銀七九八歸除之得二錢三分七釐卻以甲出銀本乘之得甲利以乙出銀本乘之得乙利丙丁仿此今有甲乙丙三人赴倉共納粟八石甲該納三石六斗二升乙該納二石八斗四升丙該納一石五斗四升已納外三人共多納六石七斗三升在倉問各多納幾何答曰甲三石四升五合三勺二抄五撮乙二石三斗八升九合一勺五抄丙一石二斗九升五合五勺二抄五撮法曰置多納過粟以八石除之得八斗四升一合二勺五抄卻以甲合納粟乘之得甲納過粟數以乙合納粟數乘之得乙
