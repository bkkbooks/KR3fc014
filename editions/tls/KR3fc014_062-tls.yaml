body:
  text: 後八分己盡九錢一八除八前位先除了一只有八分今只於下位除八恰盡七兩一一除一前位先除了六只有一兩今只於下位除一六十一六除六不動本身只於下位除六糴到米一十三石該五兩二錢二分九釐二毫三絲七微七纖除三餘九呼三六除十八定本身存六而除一十八不能盡故搭上作七纖也餘十呼三七除二十一定本身存七於本身除三十於下位還九餘一不可除起了本身於下位變作十餘四呼三三除九定本身存三於本身除一十不位還一餘三呼三二除六本身除一十下位還四八分三九除二十七定本身存九卻於本身除三十下位還三
