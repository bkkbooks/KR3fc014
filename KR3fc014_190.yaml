body:
  text: 二丈一尺以此乘五丈一尺得一百七丈一尺併二位數共一百五十丈以正長九十六丈乘之得一十四萬四千丈以五歸之得積今有築臺上廣一丈四尺下廣三丈高四丈已築高二丈五丈問今該築上廣幾何答曰該上廣二丈法曰置下廣三丈於內減上廣一丈四尺餘一丈六尺以已築二丈五尺乘之得四十丈用元高四丈歸之得一丈卻於下廣三丈內減此一丈得今該築上廣數今有築牆上廣一尺下廣四尺高一丈二尺巳築下廣二尺一寸問今該築高幾何答曰七尺六寸法曰置元下廣四尺於內減巳築下廣二尺一寸餘一尺九寸以元高一丈二尺乘之得二丈二尺八寸別置下廣四尺減訖上廣一尺餘三尺爲法以法歸二丈
