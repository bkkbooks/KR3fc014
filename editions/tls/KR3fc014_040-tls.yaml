body:
  text: 今有稅糧正米四萬六千七百五十一石二斗每石帶納耗米七升問總該幾何隔位加答曰正耗米共五萬二十三石七斗八升四合法曰置正米數以耗米隔位加之布算如後二斗二七加一十四隔一位下一十更於第三位下四一石一七加七隔二位下七五十五七加三十五隔一位下三十更於第三位下五七百七七加四十九隔一位下四十更於第三位下九六千六七加四十二隔一位下四十更於第三位下二四萬四七加二十八隔一位下二十更於第三位下八乘法二以上位數多者用此法從末位小數算起用歸除還元
