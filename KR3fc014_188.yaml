body:
  text: 法曰置上長二丈倍之得四丈加下長三丈共七丈以上廣八尺乘之得五十六丈別置下長三丈倍之得六丈加上長二丈共八丈以下廣一丈八尺乘之得一百四十四丈併入五十六丈共二百丈卻以高一丈八尺乘之得三千六百丈又六歸之合所問今有築隄一所東頭上廣八尺下廣一丈四尺高九尺西頭上廣二丈下廣二丈二尺高二丈一尺東西正長九十六丈問積幾何答曰二萬八千八百丈法曰置東高倍之得一丈八尺加西高二丈一尺共三丈九尺別置東上廣八尺併入下廣一丈四尺共二丈二尺折半得一丈一尺以此乘三丈九尺得四十二丈九尺又置西高二丈一尺倍之得四丈二尺加東高九尺共五丈一尺別置西上廣二丈併入下廣二丈二尺共四丈二尺折半得
  hash: sha256:3ca871d03fe7a6ad9ad8b37533ee7ff00cf1fec5e31b4b71b9b2602afb94d42c
