body:
  text: 九十二兩於已納稅銀二百兩內減了一百九十二兩只餘八兩以八兩為法除五千八百兩得所賣銀價元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今添重三百六十斤行一千三百里問與鈔幾何答曰一百二十六兩七錢五分法曰置元載重一千二百斤以元行道一千里乘之得一百二十萬斤為法別置元載重一千二百斤搭上今添三百六十斤共一千五百六十斤以元價七十五兩乘之得一十一萬七千又以今行道一千三百里乘之得一億五千二百一十萬卻以一百二十萬斤為法除之得今合與鈔數元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今增重四百九十二斤與鈔六十七兩六錢八分行道幾何
