body:
  text: 加二五兩逢四進一十起了本身四數而進一十於上位尚餘一四一二十二變所餘一作二更於下位加二六十逢四進一十起了本身四數而進一十於上位尚餘二四二添作五變所餘二作五二百四二添作五變本身二作五五歸五人分之每人該五十三兩六分四釐二分五二倍作四變二作四三錢五三倍作六變三作六五兩逢五進一十起了本身五數而進一十於上位六十逢五進一十起了五數而進一十於上位尚餘一五一倍作二變所餘一作二二百五二倍作四變本身二作四
