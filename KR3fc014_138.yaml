body:
  text: 錢八分五釐麥每斗價鈔一錢三分六釐問麻麥各數並該鈔幾何答曰麥二十五石二斗七升該鈔三十四兩三錢六分七釐二毫麻一十三石四斗五升該鈔二十四兩八錢八分二釐五毫法曰置麻麥共數以麻斗價乘之得七十一兩六錢三分二釐於內減訖總糶鈔餘一十二兩三錢八分二釐三毫別置麻斗價於內減訖麥斗價餘四分九釐為法以法除餘鈔一十二兩三錢八分二釐三毫得麥數於共數內減訖麥數餘為麻數卻以麥斗價乘麥數得麥總價麻總價仿此今有銀五十七兩九錢每銀一錢買桃子一百六十四箇每銀一錢買李子一百二十八箇共買得桃李八萬三千二百二十箇問各用銀及桃李各幾何
