body:
  text: 下等一百一十戶併得一百八十戶爲法以除所餘二百二十九石五斗得一石二斗七升五合卽下等一戶所出加五斗卽中等一戶所出又加七斗卽上等一戶所出卻以上等二十戶乘上等一戶所出得上等戶總中下仿此今有官配銀一千一百七兩令五等人戶從上作減半出之第一等十六戶第二等二十五戶第三等三十一戶第四等四十八戶第五等六十二戶問每戶及逐等各該銀幾何答曰第一等每戶二十四兩該三百八十四兩第二等每戶一十二兩該三百兩第三等每戶六兩該一百八十六兩第四等每戶三兩該一百四十四兩第五等每戶一兩五錢該九十三兩法曰置官配銀別置第五等六十二戶
