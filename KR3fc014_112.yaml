body:
  text: 黃米每斗價鈔五分三釐問四色併價鈔各該幾何答曰四色各該二十三石六斗八升一合二勺五抄粟該鈔八兩五分一釐六毫二絲五忽豆該鈔五兩九錢二分三毫一絲二忽五微白米該鈔一十一兩三錢六分七釐黃米該鈔一十二兩五錢五分一釐六絲二忽五微法曰置都鈔別置四色每斗價併得一錢六分為法除之得四色各該數以各色每斗價乘之得各色總價今有粟四十七石九斗將一半換米每粟一斗換米六升二合又將一半換豆麥二色每粟一斗換豆七升三合每粟八升換麥五升四合問換到三色各該幾何
