body:
  text: 十五九三七五今有銀一十二斤半問該兩幾何答曰二百兩法曰置斤數加六今有銀四百三十二兩問該斤幾何答曰二十七斤法曰置銀兩數定身除六今有銀一斤四兩問該銖幾何答曰四百八十銖法曰置一斤以四兩為二五得一二五卻以三百八十四乘之又法置一斤加六搭上四兩共二十兩卻以銖法二十四乘之今有銀一千五十六銖問該斤兩幾何答曰二斤一十二兩法曰置銖數以三八四除之得二斤餘分以銖法二十四除之得一十二兩今有鈔一十二兩四錢八分買絲一斤問一
