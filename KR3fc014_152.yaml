body:
  text: 銖該鈔幾何答曰三分二釐五毫法曰置鈔數以三八四歸除之今有鈔一十七兩三錢七分五釐買絲一斤七兩四銖每兩問該鈔幾何答曰七錢五釐法曰置鈔數別置絲一斤通作十六兩搭上七兩共二十三兩以銖法二十四乘之得五百五十二搭上四銖共五百五十六爲法以法除鈔數得三一二五卻以二十四乘之今有絲一百二十三斤一十五兩一十八銖每一十一兩六銖織絹一疋該四丈二尺問總該絹幾何答曰一百七十六疋一丈四尺法曰置絲數通作一千九百六十八兩搭上一十五兩共一千九百八十三兩以銖法二十四乘之得四萬七千五百九十二
